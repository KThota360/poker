<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settlement Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  :root { --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --accent:#f0c040; --red:#ff5c6a; --green:#3de8a0; --text:#e8eaf2; --muted:#6b7280; }
  body { background:var(--bg); color:var(--text); font-family:'Syne', sans-serif; padding:24px 16px 80px; }
  h1 { font-size:2rem; font-weight:800; text-align:center; color:var(--accent); margin-bottom:4px; }
  .subtitle { text-align:center; color:var(--muted); font-size:0.75rem; margin-bottom:28px; }
  .nav-tab { background:var(--surface); border:1px solid #252a3a; border-radius:10px; color:#888; padding:8px 4px; cursor:pointer; font-weight:700; flex:1; font-size: 0.65rem; text-transform: uppercase; }
  .nav-tab.active { background-color:var(--accent) !important; color:#0d0f14 !important; }
  .card { background:var(--surface); border:1px solid #252a3a; border-radius:14px; padding:22px; margin-bottom:20px; max-width:680px; margin-left:auto; margin-right:auto; }
  .player-row { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid #252a3a; border-radius:10px; padding:10px 14px; margin-bottom:8px; }
  .player-name-label { flex:1; font-weight:600; color:#fff; }
  input { background:#222 !important; color:white !important; border:1px solid #444; padding:8px; border-radius:6px; outline:none; font-family: inherit; }
  .calc-btn { background:#4CAF50 !important; color:white !important; border:none; border-radius:10px; cursor:pointer; font-weight:700; padding:13px; width:100%; margin-top:16px; }
  .calc-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .transfer-card { background:var(--surface2); border-left:4px solid var(--accent); padding:12px; margin-bottom:10px; border-radius:4px; font-family:'JetBrains Mono'; position: relative; }
  .payer { color:var(--red); font-weight:600; }
  .receiver { color:var(--green); font-weight:600; }
  .pay-btn-sm { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 4px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
  .inline-pay { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #252a3a; }
  .inline-pay.show { display: grid; }
  .pay-btn-full { grid-column: span 2; background: var(--green); color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: 800; cursor: pointer; }
  .history-item { background:var(--surface2); padding:12px; border-radius:8px; margin-bottom:8px; border-left: 3px solid #444; font-family:'JetBrains Mono'; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid #252a3a; border-radius:10px; padding:10px 20px; z-index:999; opacity:0; transition:0.3s; pointer-events:none;}
  .toast.show { opacity:1; }
  .standings-table { width:100%; color:white; border-collapse: collapse; font-family:'JetBrains Mono'; font-size:0.85rem; margin-bottom: 20px; }
  .standings-table th { border-bottom:1px solid #333; color:var(--accent); text-align:left; padding:8px; }
  .standings-table td { padding:8px; border-bottom:1px solid #222; }
  .remove-x { cursor: pointer; color: #888; font-weight: bold; font-size: 1.2rem; padding-left: 10px; transition: color 0.2s; }
  .remove-x:hover { color: var(--red); }
  .unbalanced-text { color: var(--red); font-weight: 800; }
  .balanced-text { color: var(--green); font-weight: 800; }
</style>
</head>
<body>

<h1>💸 Poker Settlements</h1>
<p class="subtitle">powered by firebase · instant sync</p>

<div id="login-screen" class="card" style="text-align:center; max-width:320px; margin-top:50px;">
  <h2 style="color:var(--accent)">Security Check</h2>
  <p style="font-size:0.8rem; color:var(--muted)">Enter group PIN to continue</p>
  <input type="password" id="pinInput" placeholder="••••" style="text-align:center; font-size:1.5rem; letter-spacing:8px; width:100%; margin-bottom:15px; box-sizing:border-box;">
  <button class="calc-btn" onclick="checkPin()" style="margin-top:0">Unlock App</button>
  <p id="loginError" style="color:var(--red); font-size:0.75rem; display:none; margin-top:10px;">Incorrect PIN</p>
</div>

<div id="main-app" style="display:none;">
  <div style="display:flex; gap:4px; max-width:680px; margin:0 auto 20px;">
    <button class="nav-tab active" id="btn-session" onclick="show('session')">🎮 Session</button>
    <button class="nav-tab" id="btn-results" onclick="show('results')">📊 Results</button>
    <button class="nav-tab" id="btn-log" onclick="show('log')">💰 Payments</button>
    <button class="nav-tab" id="btn-players" onclick="show('players')">👥 Players</button>
  </div>

  <div id="page-session" class="card">
    <div id="editingHeader" style="display:none; text-align:center; background:var(--accent); color:#000; padding:5px; border-radius:8px; margin-bottom:15px; font-weight:800; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">⚠️ Editing Session Mode</div>
    
    <input type="text" id="sessionNameInput" placeholder="Session Name (optional)" style="width:100%; margin-bottom:8px; box-sizing:border-box;">
    <input type="text" id="sessionNoteInput" placeholder="Add a note ($$ Tables taken, Banker...)" style="width:100%; margin-bottom:15px; box-sizing:border-box; font-size: 0.8rem; opacity: 0.8;">
    
    <div id="playersGrid">Loading...</div>
    <div id="balanceIndicator" style="text-align:center; padding:10px; font-size:0.8rem; font-family:'JetBrains Mono'; margin-top:12px; border-radius:8px; background:rgba(255,255,255,0.05);">Balanced (0 players)</div>
    
    <div style="display: flex; gap: 10px;">
      <button class="calc-btn" id="calcBtn" onclick="submitSession()" disabled style="flex: 2;">Save Session</button>
      <button class="calc-btn" onclick="resetSessionUI()" style="flex: 1; background: var(--surface2) !important; border: 1px solid #444;">Reset</button>
    </div>  
    
    <div id="editControls" style="display:none; margin-top:10px; gap: 10px;">
      <button onclick="deleteSession()" style="flex:1; background:var(--red) !important; color:white; border:none; padding:13px; border-radius:10px; font-weight:700; cursor:pointer;">Delete Session</button>
      <button onclick="cancelEditing()" style="flex:1; background:transparent !important; color:var(--text); border:1px solid #444; padding:13px; border-radius:10px; font-weight:700; cursor:pointer;">Cancel Edit</button>
    </div>
  </div>

  <div id="page-results" class="card" style="display:none;">
    <div style="display:flex; gap:2px; margin-bottom:16px;">
      <button class="nav-tab active" id="tabBtn-standings" onclick="showSub('standings')" style="font-size:0.6rem">Standings</button>
      <button class="nav-tab" id="tabBtn-overall" onclick="showSub('overall')" style="font-size:0.6rem">Settlements</button>
      <button class="nav-tab" id="tabBtn-this" onclick="showSub('this')" style="font-size:0.6rem">Latest</button>
      <button class="nav-tab" id="tabBtn-history" onclick="showSub('history')" style="font-size:0.6rem">History</button>
    </div>
    <div id="sub-standings">
      <div style="font-size:0.7rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px;">🏆 Lifetime Standings</div>
      <table class="standings-table">
        <thead><tr><th>Player</th><th style="text-align:right">Total</th></tr></thead>
        <tbody id="standingsTableBody"></tbody>
      </table>
    </div>
    <div id="sub-overall" style="display:none;"><div id="overallList"></div></div>
    <div id="sub-this" style="display:none;"><div id="latestHeader" style="margin-bottom:10px;"></div><div id="thisList"></div></div>
    <div id="sub-history" style="display:none;"><div id="historyList"></div></div>
  </div>

  <div id="page-log" class="card" style="display:none;">
    <div id="editPaymentForm" style="display:none; background:var(--surface2); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--accent);">
      <h4 style="margin-top:0; color:var(--accent); font-size:0.8rem; text-transform:uppercase;">Edit Payment</h4>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div style="grid-column: span 2; font-size:0.8rem; color:var(--muted);" id="editPayDesc"></div>
        <input type="number" id="editPayAmt" step="0.01" style="width:100%; box-sizing:border-box;">
        <input type="date" id="editPayDate" style="width:100%; box-sizing:border-box;">
        <input type="text" id="editPayNote" placeholder="Note..." style="grid-column: span 2; width:100%; box-sizing:border-box;">
        <div style="grid-column: span 2; display: flex; gap: 8px;">
            <button class="calc-btn" onclick="savePaymentEdit()" style="margin-top:5px; flex:2;">Update</button>
            <button class="calc-btn" onclick="deletePaymentEdit()" style="margin-top:5px; flex:1; background:var(--red) !important;">Delete</button>
            <button class="calc-btn" onclick="cancelPaymentEdit()" style="margin-top:5px; flex:1; background:transparent !important; border:1px solid #444;">Cancel</button>
        </div>
      </div>
    </div>
    <div id="paymentLogList"></div>
  </div>

  <div id="page-players" class="card" style="display:none;">
    <div id="groupList"></div>
    <input type="text" id="newPlayerName" placeholder="Name" style="width:100%; margin-top:10px;">
    <button class="calc-btn" onclick="addPlayer()">Add Player</button>
  </div>

  <div id="editPinModal" class="card" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:1001; width:300px; text-align:center; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
    <h3 style="color:var(--accent); margin-top:0;">Admin Access</h3>
    <p style="font-size:0.8rem; color:var(--muted)">Enter Secure PIN to edit</p>
    <input type="password" id="securePinInput" placeholder="••••" style="text-align:center; font-size:1.5rem; letter-spacing:8px; width:100%; margin-bottom:15px; box-sizing:border-box;">
    <div style="display:flex; gap:10px;">
        <button class="calc-btn" onclick="verifySecurePin()" style="margin-top:0; flex:2;">Verify</button>
        <button class="calc-btn" onclick="closeEditModal()" style="margin-top:0; flex:1; background:var(--surface2) !important; border:1px solid #444;">✕</button>
    </div>
  </div>
  <div id="modalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;" onclick="closeEditModal()"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// --- FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDuPM_MChOtI58CN7Em91NC2ujQCZzScjE",
  authDomain: "poker-settlement-12cb2.firebaseapp.com",
  projectId: "poker-settlement-12cb2",
  storageBucket: "poker-settlement-12cb2.firebasestorage.app",
  messagingSenderId: "305943610414",
  appId: "1:305943610414:web:23e8d0823cf2b43938cbbf"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const PIN_KEY = "poker_pin";
  
// --- GLOBALS ---
let editingSessionId = null;      
let targetEditSessionId = null;   
let editingPaymentId = null;
let currentEditType = 'session';  
let players = [], allSessions = [], allPayments = [];

// --- AUTH ---
function checkPin() {
  const pin = document.getElementById('pinInput').value;
  if (pin === "4604") {
    localStorage.setItem(PIN_KEY, pin);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    startListeners();
  } else { document.getElementById('loginError').style.display = 'block'; }
}

function startListeners() {
  db.collection("players").orderBy("name").onSnapshot(snap => {
    players = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    renderPlayers();
  });
  db.collection("sessions").orderBy("created_at", "desc").onSnapshot(snap => {
    allSessions = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    updateAllMath();
  });
  db.collection("payments").orderBy("date", "desc").onSnapshot(snap => {
    allPayments = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    updateAllMath();
    renderPaymentLog();
  });
}

function updateAllMath() {
  const lifetime = {}, balance = {};
  allSessions.forEach(s => {
    (s.players || []).forEach(p => {
      lifetime[p.name] = (lifetime[p.name] || 0) + p.amount;
      balance[p.name] = (balance[p.name] || 0) + p.amount;
    });
  });
  allPayments.forEach(p => {
    balance[p.from] = (balance[p.from] || 0) + p.amount;
    balance[p.to] = (balance[p.to] || 0) - p.amount;
  });
  renderResults(lifetime, balance);
}

// --- SESSION ACTIONS ---
function resetSessionUI() {
    editingSessionId = null;
    document.querySelectorAll('.player-row').forEach(row => row.style.display = 'flex');
    document.querySelectorAll('.amt').forEach(input => input.value = '');
    document.getElementById('sessionNameInput').value = '';
    document.getElementById('sessionNoteInput').value = '';
    document.getElementById('calcBtn').textContent = "Save Session";
    document.getElementById('editControls').style.display = 'none';
    document.getElementById('editingHeader').style.display = 'none';
    updateBalance();
}

async function submitSession() {
    const pData = [];
    const note = document.getElementById('sessionNoteInput').value.trim();
    const name = document.getElementById('sessionNameInput').value;
    document.querySelectorAll('.amt').forEach(el => {
        if(el.value !== "") pData.push({ name: el.dataset.name, amount: parseFloat(el.value) || 0 });
    });
    if (pData.length === 0) return;

    const data = {
        name: name || ("Session " + new Date().toLocaleDateString()),
        note: note,
        players: pData,
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
    };

    if (editingSessionId) {
        await db.collection("sessions").doc(editingSessionId).update(data);
        toast("Session Updated!", true);
    } else {
        data.created_at = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection("sessions").add(data);
        toast("Session Saved!", true);
    }
    resetSessionUI();
    show('results');
}

function cancelEditing() {
    resetSessionUI();
    toast("Edit Cancelled", false);
}

async function deleteSession() {
    if (!editingSessionId) return;
    if (confirm("Permanently delete this entire session? This will recalculate all player standings.")) {
        try {
            await db.collection("sessions").doc(editingSessionId).delete();
            resetSessionUI();
            toast("Session Deleted", true);
            show('results');
        } catch (e) { toast("Error deleting session", false); }
    }
}

function loadSessionForEditing(sessionId) {
    const session = allSessions.find(s => s.id === sessionId);
    if (!session) return;
    
    show('session'); 
    editingSessionId = sessionId;
    
    document.getElementById('sessionNameInput').value = session.name || '';
    document.getElementById('sessionNoteInput').value = session.note || '';
    
    document.querySelectorAll('.player-row').forEach(row => row.style.display = 'flex');
    document.querySelectorAll('.amt').forEach(input => {
        const pData = session.players.find(p => p.name === input.dataset.name);
        input.value = pData ? pData.amount : ""; 
    });

    document.getElementById('calcBtn').textContent = "Update Session";
    document.getElementById('editingHeader').style.display = 'block';
    document.getElementById('editControls').style.display = 'flex'; // Shows buttons
    
    updateBalance();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

// --- PLAYER UI ---
function renderPlayers() {
    const grid = document.getElementById('playersGrid'),
          list = document.getElementById('groupList');
    grid.innerHTML = ''; list.innerHTML = '';
    players.forEach(p => {
        grid.innerHTML += `
            <div class="player-row" id="row-${p.name}">
                <span class="player-name-label">${p.name}</span>
                <input type="number" class="amt" data-name="${p.name}" placeholder="0" oninput="updateBalance()">
                <span class="remove-x" onclick="removePlayerFromSession('${p.name}')">×</span>
            </div>`;
        list.innerHTML += `<div class="player-row"><span class="player-name-label">${p.name}</span></div>`;
    });
}

function removePlayerFromSession(name) {
    const row = document.getElementById(`row-${name}`);
    row.querySelector('.amt').value = "";
    row.style.display = 'none';
    updateBalance();
}

function updateBalance() {
    let total = 0, count = 0;
    document.querySelectorAll('.amt').forEach(el => {
        if(el.value !== "") { total += parseFloat(el.value) || 0; count++; }
    });
    const indicator = document.getElementById('balanceIndicator');
    const ok = Math.abs(total) < 0.01;
    indicator.innerHTML = ok ? `<span class="balanced-text">✓ Balanced (${count} players)</span>` : 
                               `<span class="unbalanced-text">⚠ Unbalanced (${total > 0 ? '+'+total.toFixed(2) : total.toFixed(2)})</span>`;
    document.getElementById('calcBtn').disabled = !ok || count < 2;
}

// --- RESULTS UI ---
function renderResults(lifetime, balance) {
    const sBody = document.getElementById('standingsTableBody');
    if (sBody) {
      sBody.innerHTML = Object.keys(lifetime).sort((a,b) => lifetime[b]-lifetime[a]).map(name => `
        <tr><td>${name}</td><td style="text-align:right; color:${lifetime[name]>=0?'var(--green)':'var(--red)'}">${lifetime[name].toFixed(2)}</td></tr>
      `).join('');
    }
    
    const settlements = computeSettlements(balance);
    document.getElementById('overallList').innerHTML = settlements.map((s, i) => `
        <div class="transfer-card">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span><span class="payer">${s.from}</span> → <span class="receiver">${s.to}</span>: <strong>$${s.amount.toFixed(2)}</strong></span>
            <button class="pay-btn-sm" onclick="togglePayForm(${i})">PAY</button>
          </div>
          <div class="inline-pay" id="pay-form-${i}">
            <input type="number" id="pay-amt-${i}" value="${s.amount.toFixed(2)}" step="0.01">
            <input type="date" id="pay-date-${i}" value="${new Date().toISOString().split('T')[0]}">
            <input type="text" id="pay-note-${i}" placeholder="Notes..." style="grid-column: span 2">
            <button class="pay-btn-full" onclick="confirmPayment('${s.from}','${s.to}',${i})">CONFIRM</button>
          </div>
        </div>
      `).join('') || "No debts!";
    
    if (allSessions.length > 0) {
        const last = allSessions[0];
        let dateLabel = last.created_at?.toDate().toLocaleDateString() || last.updated_at?.toDate().toLocaleDateString() || 'Recently';
        document.getElementById('latestHeader').innerHTML = `<strong>${last.name}</strong> <small style="color:var(--muted)">${dateLabel}</small>`;
        document.getElementById('thisList').innerHTML = (last.players || []).map(p => `
          <div style="font-size:0.85rem; padding:4px 0;">
            ${p.name}: <span style="color:${p.amount >= 0 ? 'var(--green)' : 'var(--red)'}">${p.amount >= 0 ? '+' : ''}${Number(p.amount).toFixed(2)}</span>
          </div>
        `).join('');
    }

    document.getElementById('historyList').innerHTML = allSessions.map(s => `
        <div class="history-item">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <strong>${s.name}</strong>
                <button class="pay-btn-sm" onclick="secureEditPrompt('${s.id}')">EDIT</button>
            </div>
            ${s.note ? `<div style="font-size:0.75rem; color:var(--accent); margin: 4px 0;">Note: ${s.note}</div>` : ''}
            <div style="margin-top:5px;">
                ${(s.players || []).map(p => `<small style="margin-right:8px; color:${p.amount>=0?'var(--green)':'var(--red)'}">${p.name}:${p.amount>=0?'+':''}${p.amount}</small>`).join('')}
            </div>
        </div>
    `).join('');
}

// --- SECURE EDIT ROUTING ---
function secureEditPrompt(sessionId) {
    targetEditSessionId = sessionId;
    currentEditType = 'session';
    openPinModal();
}

function securePaymentEditPrompt(paymentId) {
    targetEditSessionId = paymentId;
    currentEditType = 'payment';
    openPinModal();
}

function openPinModal() {
    document.getElementById('editPinModal').style.display = 'block';
    document.getElementById('modalOverlay').style.display = 'block';
    const pinInput = document.getElementById('securePinInput');
    pinInput.value = ''; pinInput.focus();
}

function closeEditModal() {
    document.getElementById('editPinModal').style.display = 'none';
    document.getElementById('modalOverlay').style.display = 'none';
}

async function verifySecurePin() {
    const pinInput = document.getElementById('securePinInput');
    const userPin = pinInput.value;
    try {
        const doc = await db.collection("settings").doc("app_config").get();
        if (userPin === doc.data().pin) {
            closeEditModal(); 
            if (currentEditType === 'payment') loadPaymentForEditing(targetEditSessionId);
            else loadSessionForEditing(targetEditSessionId);
        } else {
            pinInput.type = "text"; pinInput.value = "WRONG PIN";
            pinInput.style.color = "var(--red)";
            setTimeout(() => { pinInput.type = "password"; pinInput.value = ""; pinInput.style.color = ""; pinInput.focus(); }, 1500);
        }
    } catch (e) { toast("Firebase Error", false); }
}

// --- PAYMENT ACTIONS ---
function loadPaymentForEditing(paymentId) {
    const pay = allPayments.find(p => p.id === paymentId);
    if (!pay) return;
    editingPaymentId = paymentId;
    show('log'); 
    document.getElementById('editPaymentForm').style.display = 'block';
    document.getElementById('editPayDesc').innerText = `${pay.from} → ${pay.to}`;
    document.getElementById('editPayAmt').value = pay.amount;
    document.getElementById('editPayDate').value = pay.date || new Date().toISOString().split('T')[0];
    document.getElementById('editPayNote').value = pay.note || '';
    window.scrollTo({top: 0, behavior: 'smooth'});
}

async function savePaymentEdit() {
    if (!editingPaymentId) return;
    const amt = parseFloat(document.getElementById('editPayAmt').value);
    if (isNaN(amt) || amt <= 0) { toast("Invalid amount", false); return; }
    await db.collection("payments").doc(editingPaymentId).update({
        amount: amt, date: document.getElementById('editPayDate').value, note: document.getElementById('editPayNote').value,
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
    });
    cancelPaymentEdit();
    toast("Payment Updated", true);
}

async function deletePaymentEdit() {
    if (!editingPaymentId) return;
    if (confirm("Delete this payment record?")) {
        await db.collection("payments").doc(editingPaymentId).delete();
        cancelPaymentEdit();
        toast("Payment Deleted", true);
    }
}

function cancelPaymentEdit() { editingPaymentId = null; document.getElementById('editPaymentForm').style.display = 'none'; }

function renderPaymentLog() {
  const list = document.getElementById('paymentLogList');
  if (!list) return;
  list.innerHTML = allPayments.map(p => `
    <div class="history-item">
      <div style="display:flex; justify-content:space-between; align-items:start;">
        <div style="font-size:0.7rem; color:var(--muted);">${p.date || 'Recent'}</div>
        <button class="pay-btn-sm" onclick="securePaymentEditPrompt('${p.id}')">EDIT</button>
      </div>
      <span class="payer">${p.from}</span> → <span class="receiver">${p.to}</span>: <strong>$${Number(p.amount).toFixed(2)}</strong><br>
      <small>${p.note || ''}</small>
    </div>`).join('') || '<p style="text-align:center; color:var(--muted);">No payments recorded.</p>';
}

// --- UTILS ---
function show(p) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display='none');
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).style.display='block';
  document.getElementById('btn-'+p).classList.add('active');
  // If moving to session tab via nav button, and NOT editing, clean the UI
  if(p === 'session' && !editingSessionId) resetSessionUI();
}

function showSub(s) {
  document.querySelectorAll('[id^="sub-"]').forEach(el => el.style.display='none');
  document.querySelectorAll('[id^="tabBtn-"]').forEach(el => el.classList.remove('active'));
  document.getElementById('sub-'+s).style.display='block';
  document.getElementById('tabBtn-'+s).classList.add('active');
}

function toast(m, s) { 
  const e = document.getElementById('toast'); 
  e.textContent = m; e.style.color = s ? '#3de8a0' : '#ff5c6a'; 
  e.classList.add('show'); setTimeout(() => e.classList.remove('show'), 3000); 
}

function togglePayForm(i) { const f = document.getElementById(`pay-form-${i}`); if(f) f.classList.toggle('show'); }

function computeSettlements(balMap) {
  let bal = Object.keys(balMap).map(n => ({name:n, bal: Math.round(balMap[n]*100)/100})).filter(x => Math.abs(x.bal) > 0.01);
  const txns = [];
  while (bal.length > 1) {
    bal.sort((a,b) => a.bal - b.bal);
    let d = bal[0], c = bal[bal.length-1];
    let a = Math.round(Math.min(Math.abs(d.bal), c.bal)*100)/100;
    if (a > 0) { txns.push({from: d.name, to: c.name, amount: a}); d.bal += a; c.bal -= a; }
    bal = bal.filter(p => Math.abs(p.bal) > 0.01);
  }
  return txns;
}

async function addPlayer() {
  const n = document.getElementById('newPlayerName').value.trim();
  if (n) { await db.collection("players").add({ name: n }); document.getElementById('newPlayerName').value = ''; }
}

async function confirmPayment(f, t, i) {
  const a = parseFloat(document.getElementById(`pay-amt-${i}`).value);
  if (!isNaN(a) && a > 0) {
    await db.collection("payments").add({from:f, to:t, amount:a, date:document.getElementById(`pay-date-${i}`).value, note:document.getElementById(`pay-note-${i}`).value || ''});
    toast("Payment Logged!", true);
  }
}

if (localStorage.getItem(PIN_KEY) === "4604") {
  document.getElementById('pinInput').value = "4604";
  checkPin();
}
</script>
