<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settlement Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  :root { --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --accent:#f0c040; --red:#ff5c6a; --green:#3de8a0; --text:#e8eaf2; --muted:#6b7280; }
  body { background:var(--bg); color:var(--text); font-family:'Syne', sans-serif; padding:24px 16px 80px; }
  h1 { font-size:2rem; font-weight:800; text-align:center; color:var(--accent); margin-bottom:4px; }
  .subtitle { text-align:center; color:var(--muted); font-size:0.75rem; margin-bottom:28px; }
  .nav-tab { background:var(--surface); border:1px solid #252a3a; border-radius:10px; color:#888; padding:8px 4px; cursor:pointer; font-weight:700; flex:1; font-size: 0.65rem; text-transform: uppercase; }
  .nav-tab.active { background-color:var(--accent) !important; color:#0d0f14 !important; }
  .card { background:var(--surface); border:1px solid #252a3a; border-radius:14px; padding:22px; margin-bottom:20px; max-width:680px; margin-left:auto; margin-right:auto; }
  .player-row { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid #252a3a; border-radius:10px; padding:10px 14px; margin-bottom:8px; }
  .player-name-label { flex:1; font-weight:600; color:#fff; }
  input { background:#222 !important; color:white !important; border:1px solid #444; padding:8px; border-radius:6px; outline:none; font-family: inherit; }
  .calc-btn { background:#4CAF50 !important; color:white !important; border:none; border-radius:10px; cursor:pointer; font-weight:700; padding:13px; width:100%; margin-top:16px; }
  .calc-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .transfer-card { background:var(--surface2); border-left:4px solid var(--accent); padding:12px; margin-bottom:10px; border-radius:4px; font-family:'JetBrains Mono'; position: relative; }
  .payer { color:var(--red); font-weight:600; }
  .receiver { color:var(--green); font-weight:600; }
  .pay-btn-sm { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 4px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
  .inline-pay { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #252a3a; }
  .inline-pay.show { display: grid; }
  .pay-btn-full { grid-column: span 2; background: var(--green); color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: 800; cursor: pointer; }
  .history-item { background:var(--surface2); padding:12px; border-radius:8px; margin-bottom:8px; border-left: 3px solid #444; font-family:'JetBrains Mono'; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid #252a3a; border-radius:10px; padding:10px 20px; z-index:999; opacity:0; transition:0.3s; pointer-events:none;}
  .toast.show { opacity:1; }
  .standings-table { width:100%; color:white; border-collapse: collapse; font-family:'JetBrains Mono'; font-size:0.85rem; margin-bottom: 20px; }
  .standings-table th { border-bottom:1px solid #333; color:var(--accent); text-align:left; padding:8px; }
  .standings-table td { padding:8px; border-bottom:1px solid #222; }
</style>
</head>
<body>

<h1>💸 Poker Settlements</h1>
<p class="subtitle">powered by firebase · instant sync</p>

<div id="login-screen" class="card" style="text-align:center; max-width:320px; margin-top:50px;">
  <h2 style="color:var(--accent)">Security Check</h2>
  <p style="font-size:0.8rem; color:var(--muted)">Enter group PIN to continue</p>
  <input type="password" id="pinInput" placeholder="••••" style="text-align:center; font-size:1.5rem; letter-spacing:8px; width:100%; margin-bottom:15px; box-sizing:border-box;">
  <button class="calc-btn" onclick="checkPin()" style="margin-top:0">Unlock App</button>
  <p id="loginError" style="color:var(--red); font-size:0.75rem; display:none; margin-top:10px;">Incorrect PIN</p>
</div>

<div id="main-app" style="display:none;">
  <div style="display:flex; gap:4px; max-width:680px; margin:0 auto 20px;">
    <button class="nav-tab active" id="btn-session" onclick="show('session')">🎮 Session</button>
    <button class="nav-tab" id="btn-results" onclick="show('results')">📊 Results</button>
    <button class="nav-tab" id="btn-log" onclick="show('log')">💰 Payments</button>
    <button class="nav-tab" id="btn-players" onclick="show('players')">👥 Players</button>
  </div>

  <div id="page-session" class="card">
    <input type="text" id="sessionNameInput" placeholder="Session Name (optional)" style="width:100%; margin-bottom:15px; box-sizing:border-box;">
    <div id="playersGrid">Loading...</div>
    <div id="balanceIndicator" style="text-align:center; padding:10px; font-size:0.8rem; font-family:'JetBrains Mono'; margin-top:12px; border-radius:8px; background:rgba(255,255,255,0.05);">Balanced (0 players)</div>
    <button class="calc-btn" id="calcBtn" onclick="submitSession()" disabled>Save Session</button>
  </div>

  <div id="page-results" class="card" style="display:none;">
    <div style="display:flex; gap:2px; margin-bottom:16px;">
      <button class="nav-tab active" id="tabBtn-standings" onclick="showSub('standings')" style="font-size:0.6rem">Standings</button>
      <button class="nav-tab" id="tabBtn-overall" onclick="showSub('overall')" style="font-size:0.6rem">Settlements</button>
      <button class="nav-tab" id="tabBtn-this" onclick="showSub('this')" style="font-size:0.6rem">Latest</button>
      <button class="nav-tab" id="tabBtn-history" onclick="showSub('history')" style="font-size:0.6rem">History</button>
    </div>
    <div id="sub-standings"><table class="standings-table"><thead><tr><th>Player</th><th style="text-align:right">Total</th></tr></thead><tbody id="standingsTableBody"></tbody></table></div>
    <div id="sub-overall" style="display:none;"><div id="overallList"></div></div>
    <div id="sub-this" style="display:none;"><div id="latestHeader" style="margin-bottom:10px;"></div><div id="thisList"></div></div>
    <div id="sub-history" style="display:none;"><div id="historyList"></div></div>
  </div>

  <div id="page-log" class="card" style="display:none;"><div id="paymentLogList"></div></div>
  <div id="page-players" class="card" style="display:none;"><div id="groupList"></div><input type="text" id="newPlayerName" placeholder="Name" style="width:100%; margin-top:10px;"><button class="calc-btn" onclick="addPlayer()">Add Player</button></div>
</div>

<div id="toast" class="toast"></div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyDuPM_MChOtI58CN7Em91NC2ujQCZzScjE",
  authDomain: "poker-settlement-12cb2.firebaseapp.com",
  projectId: "poker-settlement-12cb2",
  storageBucket: "poker-settlement-12cb2.firebasestorage.app",
  messagingSenderId: "305943610414",
  appId: "1:305943610414:web:23e8d0823cf2b43938cbbf" 
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const PIN_KEY = "poker_pin";

// --- CORE APP LOGIC ---
let players = [], allSessions = [], allPayments = [];

function checkPin() {
  const pin = document.getElementById('pinInput').value;
  if (pin === "4604") {
    localStorage.setItem(PIN_KEY, pin);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    startListeners();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function startListeners() {
  // Real-time Players
  db.collection("players").orderBy("name").onSnapshot(snap => {
    players = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    renderPlayers();
  });

  // Real-time Sessions
  db.collection("sessions").orderBy("created_at", "desc").onSnapshot(snap => {
    allSessions = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    updateAllMath();
  });

  // Real-time Payments
  db.collection("payments").orderBy("date", "desc").onSnapshot(snap => {
    allPayments = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
    updateAllMath();
    renderPaymentLog();
  });
}

function updateAllMath() {
  const lifetime = {}, balance = {};
  
  allSessions.forEach(s => {
    (s.players || []).forEach(p => {
      lifetime[p.name] = (lifetime[p.name] || 0) + p.amount;
      balance[p.name] = (balance[p.name] || 0) + p.amount;
    });
  });

  allPayments.forEach(p => {
    balance[p.from] = (balance[p.from] || 0) + p.amount;
    balance[p.to] = (balance[p.to] || 0) - p.amount;
  });

  renderResults(lifetime, balance);
}

function computeSettlements(balMap) {
  let bal = Object.keys(balMap).map(name => ({name, bal: Math.round(balMap[name]*100)/100})).filter(x => Math.abs(x.bal) > 0.01);
  const txns = [];
  while (bal.length > 1) {
    bal.sort((a,b) => a.bal - b.bal);
    let debtor = bal[0], creditor = bal[bal.length-1];
    let amt = Math.round(Math.min(Math.abs(debtor.bal), creditor.bal)*100)/100;
    if (amt > 0) {
      txns.push({from: debtor.name, to: creditor.name, amount: amt});
      debtor.bal += amt; creditor.bal -= amt;
    }
    bal = bal.filter(p => Math.abs(p.bal) > 0.01);
  }
  return txns;
}

// --- DATABASE ACTIONS ---
async function submitSession() {
  const pData = [];
  document.querySelectorAll('.amt').forEach(el => {
    const val = parseFloat(el.value) || 0;
    if(val !== 0) pData.push({ name: el.dataset.name, amount: val });
  });
  await db.collection("sessions").add({
    name: document.getElementById('sessionNameInput').value || ("Session " + new Date().toLocaleDateString()),
    players: pData,
    created_at: firebase.firestore.FieldValue.serverTimestamp()
  });
  toast("Session Saved", true);
  document.getElementById('sessionNameInput').value = '';
  show('results');
}

async function addPlayer() {
  const name = document.getElementById('newPlayerName').value.trim();
  if (!name) return;
  await db.collection("players").add({ name });
  document.getElementById('newPlayerName').value = '';
  toast("Player Added", true);
}

// --- UPDATED DATABASE ACTIONS ---

async function confirmPayment(from, to, i) {
  // Grab values from the specific inline form
  const amt = parseFloat(document.getElementById(`pay-amt-${i}`).value);
  const date = document.getElementById(`pay-date-${i}`).value;
  const note = document.getElementById(`pay-note-${i}`).value;

  if (isNaN(amt) || amt <= 0) {
    toast("Enter a valid amount", false);
    return;
  }

  await db.collection("payments").add({
    from, 
    to, 
    amount: amt, 
    date: date || new Date().toISOString().split('T')[0],
    note: note || ''
  });
  
  toast("Payment Logged!", true);
}

// --- UPDATED UI HELPERS ---

function togglePayForm(i) {
  const form = document.getElementById(`pay-form-${i}`);
  form.classList.toggle('show');
}

function renderResults(lifetime, balance) {
  // 1. Standings
  const sBody = document.getElementById('standingsTableBody');
  sBody.innerHTML = Object.keys(lifetime).sort((a,b) => lifetime[b]-lifetime[a]).map(name => `
    <tr><td>${name}</td><td style="text-align:right; color:${lifetime[name]>=0?'var(--green)':'var(--red)'}">${lifetime[name].toFixed(2)}</td></tr>
  `).join('');

  // 2. Settlements (with Partial Payment Form)
  const settlements = computeSettlements(balance);
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('overallList').innerHTML = settlements.map((s, i) => `
    <div class="transfer-card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span><span class="payer">${s.from}</span> → <span class="receiver">${s.to}</span>: <strong>$${s.amount.toFixed(2)}</strong></span>
        <button class="pay-btn-sm" onclick="togglePayForm(${i})">PAY</button>
      </div>
      <div class="inline-pay" id="pay-form-${i}">
        <input type="number" id="pay-amt-${i}" value="${s.amount.toFixed(2)}" step="0.01">
        <input type="date" id="pay-date-${i}" value="${today}">
        <input type="text" id="pay-note-${i}" placeholder="Notes (Venmo, Cash, etc.)" style="grid-column: span 2">
        <button class="pay-btn-full" onclick="confirmPayment('${s.from}','${s.to}',${i})">CONFIRM PAYMENT</button>
      </div>
    </div>
  `).join('') || "No debts!";

  // 3. Latest Session Fix
  if (allSessions.length > 0) {
    const last = allSessions[0]; // most recent due to orderBy desc
    const dateLabel = last.created_at ? last.created_at.toDate().toLocaleDateString() : 'Just now';
    document.getElementById('latestHeader').innerHTML = `<strong>${last.name}</strong> <small style="color:var(--muted)">${dateLabel}</small>`;
    document.getElementById('thisList').innerHTML = (last.players || []).map(p => `
      <div style="font-size:0.85rem; padding:4px 0;">
        ${p.name}: <span style="color:${p.amount > 0 ? 'var(--green)' : 'var(--red)'}">${p.amount > 0 ? '+' : ''}${p.amount.toFixed(2)}</span>
      </div>
    `).join('');
  }

  // 4. History
  document.getElementById('historyList').innerHTML = allSessions.map(s => `
    <div class="history-item">
      <strong>${s.name}</strong><br>
      ${(s.players || []).map(p => `<small style="margin-right:8px; color:${p.amount >= 0 ? 'var(--green)' : 'var(--red)'}">${p.name}: ${p.amount}</small>`).join('')}
    </div>
  `).join('');
}
function show(p) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display='none');
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).style.display='block';
  document.getElementById('btn-'+p).classList.add('active');
}

function showSub(s) {
  document.querySelectorAll('[id^="sub-"]').forEach(el => el.style.display='none');
  document.querySelectorAll('[id^="tabBtn-"]').forEach(el => el.classList.remove('active'));
  document.getElementById('sub-'+s).style.display='block';
  document.getElementById('tabBtn-'+s).classList.add('active');
}

function toast(m, s) { const e = document.getElementById('toast'); e.textContent = m; e.style.color = s ? '#3de8a0' : '#ff5c6a'; e.classList.add('show'); setTimeout(() => e.classList.remove('show'), 3000); }

// Auto-login if PIN is saved
if (localStorage.getItem(PIN_KEY) === "4604") {
  document.getElementById('pinInput').value = "4604";
  checkPin();
}
</script>
</body>
</html>
