<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settlement Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --accent:#f0c040; --red:#ff5c6a; --green:#3de8a0; --text:#e8eaf2; --muted:#6b7280; }
  body { background:var(--bg); color:var(--text); font-family:'Syne', sans-serif; padding:24px 16px 80px; }
  h1 { font-size:2rem; font-weight:800; text-align:center; color:var(--accent); margin-bottom:4px; }
  .subtitle { text-align:center; color:var(--muted); font-size:0.75rem; margin-bottom:28px; }
  .nav-tab { background:var(--surface); border:1px solid #252a3a; border-radius:10px; color:#888; padding:8px 4px; cursor:pointer; font-weight:700; flex:1; font-size: 0.65rem; text-transform: uppercase; }
  .nav-tab.active { background-color:var(--accent) !important; color:#0d0f14 !important; }
  .card { background:var(--surface); border:1px solid #252a3a; border-radius:14px; padding:22px; margin-bottom:20px; max-width:680px; margin-left:auto; margin-right:auto; }
  .player-row { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid #252a3a; border-radius:10px; padding:10px 14px; margin-bottom:8px; }
  .player-name-label { flex:1; font-weight:600; color:#fff; }
  input { background:#222 !important; color:white !important; border:1px solid #444; padding:8px; border-radius:6px; outline:none; font-family: inherit; }
  .calc-btn { background:#4CAF50 !important; color:white !important; border:none; border-radius:10px; cursor:pointer; font-weight:700; padding:13px; width:100%; margin-top:16px; }
  .calc-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .transfer-card { background:var(--surface2); border-left:4px solid var(--accent); padding:12px; margin-bottom:10px; border-radius:4px; font-family:'JetBrains Mono'; position: relative; }
  .payer { color:var(--red); font-weight:600; }
  .receiver { color:var(--green); font-weight:600; }
  .pay-btn-sm { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 4px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
  .inline-pay { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #252a3a; }
  .inline-pay.show { display: grid; }
  .pay-btn-full { grid-column: span 2; background: var(--green); color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: 800; cursor: pointer; }
  .history-item { background:var(--surface2); padding:12px; border-radius:8px; margin-bottom:8px; border-left: 3px solid #444; font-family:'JetBrains Mono'; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid #252a3a; border-radius:10px; padding:10px 20px; z-index:999; opacity:0; transition:0.3s; pointer-events:none;}
  .toast.show { opacity:1; }
  .standings-table { width:100%; color:white; border-collapse: collapse; font-family:'JetBrains Mono'; font-size:0.85rem; margin-bottom: 20px; }
  .standings-table th { border-bottom:1px solid #333; color:var(--accent); text-align:left; padding:8px; }
  .standings-table td { padding:8px; border-bottom:1px solid #222; }
</style>
</head>
<body>

<h1>💸 Settlement</h1>
<p class="subtitle">google sheets · real-time netting</p>

<div style="display:flex; gap:4px; max-width:680px; margin:0 auto 20px;">
  <button class="nav-tab active" id="btn-session" onclick="show('session')">🎮 Session</button>
  <button class="nav-tab" id="btn-results" onclick="show('results')">📊 Results</button>
  <button class="nav-tab" id="btn-log" onclick="show('log')">💰 Payments</button>
  <button class="nav-tab" id="btn-players" onclick="show('players')">👥 Players</button>
</div>

<div id="page-session" class="card">
  <input type="text" id="sessionNameInput" placeholder="Session Name (optional)" style="width:100%; margin-bottom:15px; box-sizing:border-box;">
  <div id="playersGrid">Loading players...</div>
  <div id="balanceIndicator" style="text-align:center; padding:10px; font-size:0.8rem; font-family:'JetBrains Mono'; margin-top:12px; border-radius:8px; background:rgba(255,255,255,0.05);">Balanced (0 players)</div>
  <button class="calc-btn" id="calcBtn" onclick="submitSession()" disabled>Save Session</button>
</div>

<div id="page-results" class="card" style="display:none;">
  <div style="display:flex; gap:2px; margin-bottom:16px;">
    <button class="nav-tab active" id="tabBtn-standings" onclick="showSub('standings')" style="font-size:0.6rem">Standings</button>
    <button class="nav-tab" id="tabBtn-overall" onclick="showSub('overall')" style="font-size:0.6rem">Settlements</button>
    <button class="nav-tab" id="tabBtn-this" onclick="showSub('this')" style="font-size:0.6rem">Latest Session</button>
    <button class="nav-tab" id="tabBtn-history" onclick="showSub('history')" style="font-size:0.6rem">History</button>
  </div>
  
  <div id="sub-standings">
    <div style="font-size:0.7rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px;">🏆 Lifetime Standings</div>
    <table class="standings-table">
      <thead><tr><th>Player</th><th style="text-align:right">Total Win/Loss</th></tr></thead>
      <tbody id="standingsTableBody"></tbody>
    </table>
  </div>

  <div id="sub-overall" style="display:none;">
    <div style="font-size:0.7rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px;">💰 Current Debt</div>
    <div id="overallList"></div>
  </div>

  <div id="sub-this" style="display:none;"><div id="latestHeader" style="margin-bottom:10px;"></div><div id="thisList"></div></div>
  <div id="sub-history" style="display:none;"><div id="historyList"></div></div>
</div>

<div id="page-log" class="card" style="display:none;">
  <h3 style="margin-top:0; color:var(--accent)">Payment Log</h3>
  <div id="paymentLogList"></div>
</div>

<div id="page-players" class="card" style="display:none;">
  <div id="groupList"></div>
  <input type="text" id="newPlayerName" placeholder="New Player Name" style="width:100%; margin-top:10px; box-sizing:border-box;">
  <button onclick="addPlayer()" style="margin-top:10px; width:100%; background:var(--accent); color:#000; font-weight:bold; border:none; padding:12px; border-radius:8px; cursor:pointer;">Add Player</button>
</div>

<div id="toast" class="toast"></div>

<script>
let players = [], sessions = [];

function toast(msg, success) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.color = success ? '#3de8a0' : '#ff5c6a';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// THE BRIDGE: Talk to Google Sheets from GitHub
async function call(action, payload) {
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbxSk89VMMvmPVxNxscJ1j5D-X0kqdaJklCnkaJuyyzqNWm8bBLAVgvHvYX_PpRsh7hupA/exec'; 
  const query = `action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
  const finalUrl = `${scriptUrl}?${query}`;

  try {
    const response = await fetch(finalUrl);
    if (!response.ok) throw new Error('Network error');
    const data = await response.json();
    if (data.error) throw data.error;
    return data;
  } catch (err) {
    console.error("Connection failed:", err);
    toast("Connection Error", false);
    throw err;
  }
}

function show(p) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display='none');
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).style.display='block';
  document.getElementById('btn-'+p).classList.add('active');
  if(p==='results') loadSessions();
  if(p==='log') loadPaymentLog();
}

function showSub(s) {
  document.querySelectorAll('[id^="sub-"]').forEach(el => el.style.display='none');
  document.querySelectorAll('[id^="tabBtn-"]').forEach(el => el.classList.remove('active'));
  document.getElementById('sub-'+s).style.display='block';
  document.getElementById('tabBtn-'+s).classList.add('active');
}

function togglePayForm(i) { document.getElementById(`pay-form-${i}`).classList.toggle('show'); }

async function loadPlayers() {
  try {
    players = await call('getPlayers');
    const grid = document.getElementById('playersGrid'), gList = document.getElementById('groupList');
    grid.innerHTML = ''; gList.innerHTML = '';
    players.forEach(p => {
      grid.innerHTML += `<div class="player-row" id="row-${p.id}"><span class="player-name-label">${p.name}</span><input type="number" class="amt" data-name="${p.name}" placeholder="0" oninput="updateBalance()"> <button onclick="removeRow('${p.id}')" style="background:none; border:none; color:#666; cursor:pointer;">✕</button></div>`;
      gList.innerHTML += `<div class="player-row"><span class="player-name-label">${p.name}</span></div>`;
    });
  } catch(e) { }
}

function removeRow(id) { document.getElementById('row-'+id).remove(); updateBalance(); }

function updateBalance() {
  let total = 0, count = 0;
  document.querySelectorAll('.amt').forEach(el => { total += parseFloat(el.value) || 0; count++; });
  const el = document.getElementById('balanceIndicator'), btn = document.getElementById('calcBtn');
  const ok = Math.abs(total) < 0.01;
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  el.textContent = ok ? `✓ Balanced (${count} players)` : `Unbalanced: ${total > 0 ? 'Over' : 'Short'} by $${Math.abs(total).toFixed(2)}`;
  btn.disabled = !ok || count < 2;
}

async function submitSession() {
  const pData = [];
  document.querySelectorAll('.amt').forEach(el => {
    const val = parseFloat(el.value) || 0;
    if(val !== 0) pData.push({ name: el.dataset.name, amount: val });
  });
  await call('addSession', { name: document.getElementById('sessionNameInput').value, players: pData });
  toast('Saved!', true);
  document.getElementById('sessionNameInput').value = '';
  loadPlayers();
  show('results');
}

async function loadSessions() {
  const data = await call('getSessions');
  sessions = data.sessions || [];
  renderResults(data);
}

function renderResults(data) {
  const tList = document.getElementById('thisList'), oList = document.getElementById('overallList'), hList = document.getElementById('historyList'), header = document.getElementById('latestHeader'), sTable = document.getElementById('standingsTableBody');
  const today = new Date().toISOString().split('T')[0];
  oList.innerHTML = ''; tList.innerHTML = ''; hList.innerHTML = ''; sTable.innerHTML = '';

  (data.standings || []).forEach(p => {
    const color = p.lifetime > 0 ? 'var(--green)' : (p.lifetime < 0 ? 'var(--red)' : '#888');
    sTable.innerHTML += `<tr><td>${p.name}</td><td style="text-align:right; color:${color}">${p.lifetime > 0 ? '+' : ''}${p.lifetime.toFixed(2)}</td></tr>`;
  });

  (data.efficientSettlements || []).forEach((s, i) => {
    oList.innerHTML += `
      <div class="transfer-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span><span class="payer">${s.from}</span> → <span class="receiver">${s.to}</span>: <strong>$${s.amount.toFixed(2)}</strong></span>
          <button class="pay-btn-sm" onclick="togglePayForm(${i})">PAY</button>
        </div>
        <div class="inline-pay" id="pay-form-${i}">
          <input type="number" id="pay-amt-${i}" value="${s.amount.toFixed(2)}">
          <input type="date" id="pay-date-${i}" value="${today}">
          <input type="text" id="pay-note-${i}" placeholder="Note..." style="grid-column: span 2">
          <button class="pay-btn-full" onclick="processPayment('${s.from}', '${s.to}', ${i})">CONFIRM</button>
        </div>
      </div>`;
  });

  if(sessions.length > 0) {
    const last = sessions[sessions.length-1];
    header.innerHTML = `<strong>${last.name}</strong> <small style="color:var(--muted)">${last.date}</small>`;
    last.players.forEach(p => { if(p.amount !== 0) tList.innerHTML += `<div style="font-size:0.85rem; padding:4px 0;">${p.name}: <span style="color:${p.amount > 0 ? 'var(--green)' : 'var(--red)'}">${p.amount > 0 ? '+' : ''}${p.amount}</span></div>`; });
  }

  [...sessions].reverse().forEach(s => {
    const sc = s.players.map(p => `<span style="font-size:0.7rem; color:${p.amount > 0 ? '#3de8a0' : '#ff5c6a'}; margin-right:8px;">${p.name}: ${p.amount > 0 ? '+' : ''}${p.amount}</span>`).join('');
    hList.innerHTML += `<div class="history-item"><strong>${s.name}</strong><br>${sc}</div>`;
  });
}

async function processPayment(from, to, i) {
  const amt = parseFloat(document.getElementById(`pay-amt-${i}`).value);
  const date = document.getElementById(`pay-date-${i}`).value;
  const note = document.getElementById(`pay-note-${i}`).value;
  await call('addPayment', { from, to, amount: amt, date, note });
  toast('Paid!', true);
  loadSessions();
}

async function loadPaymentLog() {
  const log = await call('getPayments');
  const list = document.getElementById('paymentLogList');
  list.innerHTML = '';
  log.forEach(p => {
    list.innerHTML += `<div class="history-item"><div style="font-size:0.7rem; color:var(--muted);">${p.date}</div><span class="payer">${p.from_player}</span> → <span class="receiver">${p.to_player}</span>: <strong>$${p.amount}</strong><br><small>${p.note || ''}</small></div>`;
  });
}

async function addPlayer() {
  const name = document.getElementById('newPlayerName').value;
  if(!name) return;
  await call('addPlayer', { name });
  document.getElementById('newPlayerName').value = '';
  loadPlayers();
}

loadPlayers();
</script>
</body>
</html>
